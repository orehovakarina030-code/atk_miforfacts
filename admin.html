<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель · Миф / Факт</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box, .admin-container {
            background: white;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #1f3b54;
        }
        .login-box input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #cbdae8;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #2b5a7a;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-box button:hover { background: #1f4b6e; }
        .error { color: #c0392b; margin-top: 10px; }
        .hidden { display: none !important; }

        .admin-container {
            text-align: left;
        }
        .admin-container h2 {
            color: #1f3b54;
            margin-bottom: 20px;
            text-align: center;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .admin-table th {
            text-align: left;
            padding: 8px 12px;
            background: #eef2f7;
            border-radius: 12px;
            font-weight: 600;
            color: #1f3b54;
        }
        .admin-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #eef2f7;
        }
        .admin-table .errors { font-weight: 700; color: #c0392b; }
        .admin-table .correct { font-weight: 700; color: #1d7a44; }
        .download-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: #2b5a7a;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .download-btn:hover { background: #1f4b6e; }
        .clear-btn {
            margin-left: 10px;
            padding: 10px 24px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .clear-btn:hover { background: #a93226; }
        .stats-info {
            margin: 12px 0;
            padding: 12px;
            background: #eef2f7;
            border-radius: 16px;
            font-size: 0.9rem;
            color: #1f3b54;
        }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #2b5a7a;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- Форма входа -->
<div id="loginForm" class="login-box">
    <h2>🔒 Админ-панель</h2>
    <p style="color: #7f8c8d; margin-bottom: 20px;">Введите пароль для доступа к статистике</p>
    <input type="password" id="passwordInput" placeholder="Введите пароль" onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Войти</button>
    <div id="loginError" class="error"></div>
</div>

<!-- Админ-контент (скрыт до входа) -->
<div id="adminContent" class="admin-container hidden">
    <h2>📊 Статистика игры «Миф / Факт»</h2>

    <div class="stats-info" id="statsInfo">
        Данные загружаются...
    </div>

    <table class="admin-table">
        <thead>
            <tr>
                <th>Команда / Игрок</th>
                <th>✅ Правильно</th>
                <th>❌ Ошибки</th>
                <th>📊 Всего</th>
                <th>🎯 %</th>
            </tr>
        </thead>
        <tbody id="adminBody">
            <tr><td colspan="5" style="text-align:center; color:#8aaac9;">Нет данных</td></tr>
        </tbody>
    </table>

    <h3 style="margin-top: 24px; font-size: 1rem; color: #1f3b54;">📝 Детальный лог ответов</h3>
    <div style="max-height: 300px; overflow-y: auto; border: 1px solid #eef2f7; border-radius: 16px; padding: 8px; margin-top: 8px;">
        <table class="admin-table" id="logTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Команда</th>
                    <th>Утверждение</th>
                    <th>Тип</th>
                    <th>Выбор</th>
                    <th>Результат</th>
                </tr>
            </thead>
            <tbody id="logBody">
                <tr><td colspan="6" style="text-align:center; color:#8aaac9;">Нет данных</td></tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 16px; display: flex; flex-wrap: wrap; gap: 10px;">
        <button class="download-btn" id="downloadStatsBtn">📥 Скачать статистику (CSV)</button>
        <button class="clear-btn" id="clearStatsBtn">🗑️ Очистить статистику</button>
    </div>

    <a href="./" class="back-link">← Вернуться к игре</a>
</div>

<script>
    // ============================================================
    // ПАРОЛЬ (можно изменить)
    // ============================================================
    const ADMIN_PASSWORD = 'maxim26';

    // ============================================================
    // ФУНКЦИИ
    // ============================================================

    function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        if (password === ADMIN_PASSWORD) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminContent').classList.remove('hidden');
            loadAndDisplayStats();
        } else {
            document.getElementById('loginError').textContent = '❌ Неверный пароль!';
            document.getElementById('passwordInput').value = '';
        }
    }

    function loadAndDisplayStats() {
        const saved = localStorage.getItem('mifFaktStats');
        if (!saved) {
            document.getElementById('statsInfo').innerHTML = '📭 Статистика пока не сохранена. Сыграйте хотя бы одну игру.';
            document.getElementById('adminBody').innerHTML =
                `<tr><td colspan="5" style="text-align:center; color:#8aaac9;">Нет данных</td></tr>`;
            document.getElementById('logBody').innerHTML =
                `<tr><td colspan="6" style="text-align:center; color:#8aaac9;">Нет данных</td></tr>`;
            return;
        }

        try {
            const data = JSON.parse(saved);
            const scores = data.scores || {};
            const log = data.log || [];
            const teams = data.teams || ['Команда 1', 'Команда 2'];
            const seed = data.seed || '—';
            const date = data.date ? new Date(data.date).toLocaleString() : '—';

            // Информация
            document.getElementById('statsInfo').innerHTML = `
                🗓️ Дата: ${date}<br>
                🔢 Seed: ${seed}<br>
                👥 Команды: ${teams.join(', ')}<br>
                📝 Всего ответов: ${log.length}
            `;

            // Таблица результатов
            let html = '';
            teams.forEach(team => {
                const s = scores[team] || { correct: 0, errors: 0, total: 0 };
                const pct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
                html += `
                    <tr>
                        <td><strong>${team}</strong></td>
                        <td class="correct">${s.correct}</td>
                        <td class="errors">${s.errors}</td>
                        <td>${s.total}</td>
                        <td>${pct}%</td>
                    </tr>
                `;
            });
            if (!html) {
                html = `<tr><td colspan="5" style="text-align:center; color:#8aaac9;">Нет данных</td></tr>`;
            }
            document.getElementById('adminBody').innerHTML = html;

            // Лог ответов
            let logHtml = '';
            log.forEach((item, index) => {
                const resultText = item.isCorrect ? '✅ Верно' : '❌ Ошибка';
                const typeLabel = item.type === 'myth' ? 'Миф' : 'Факт';
                const choiceLabel = item.choice === 'myth' ? 'Миф' : 'Факт';
                logHtml += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.team || '—'}</td>
                        <td style="max-width:200px; word-break:break-word;">${item.statement || '—'}</td>
                        <td>${typeLabel}</td>
                        <td>${choiceLabel}</td>
                        <td>${resultText}</td>
                    </tr>
                `;
            });
            if (!logHtml) {
                logHtml = `<tr><td colspan="6" style="text-align:center; color:#8aaac9;">Нет данных</td></tr>`;
            }
            document.getElementById('logBody').innerHTML = logHtml;

        } catch(e) {
            document.getElementById('statsInfo').innerHTML = '⚠️ Ошибка загрузки данных';
        }
    }

    function downloadCSV() {
        const saved = localStorage.getItem('mifFaktStats');
        if (!saved) {
            alert('Нет данных для скачивания.');
            return;
        }

        try {
            const data = JSON.parse(saved);
            const scores = data.scores || {};
            const log = data.log || [];
            const teams = data.teams || ['Команда 1', 'Команда 2'];
            const date = data.date || new Date().toISOString();

            let csv = 'Итоговая статистика:\n';
            csv += 'Команда,Правильно,Ошибки,Всего,%\n';
            teams.forEach(team => {
                const s = scores[team] || { correct: 0, errors: 0, total: 0 };
                const pct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
                csv += `"${team}",${s.correct},${s.errors},${s.total},${pct}%\n`;
            });

            csv += '\nДетальный лог:\n';
            csv += '№,Команда,Утверждение,Тип,Выбор,Результат\n';
            log.forEach((item, index) => {
                const resultText = item.isCorrect ? 'Верно' : 'Ошибка';
                const typeLabel = item.type === 'myth' ? 'Миф' : 'Факт';
                const choiceLabel = item.choice === 'myth' ? 'Миф' : 'Факт';
                const statement = (item.statement || '—').replace(/"/g, '""');
                csv += `${index + 1},"${item.team || '—'}","${statement}","${typeLabel}","${choiceLabel}","${resultText}"\n`;
            });

            csv += `\nДата: ${new Date(date).toLocaleString()}\n`;
            csv += `Seed: ${data.seed || '—'}\n`;

            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().slice(0, 19).replace(/[:-]/g, '');
            link.download = `statistika_mif_fakt_${dateStr}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);

        } catch(e) {
            alert('Ошибка при создании CSV: ' + e.message);
        }
    }

    function clearStats() {
        if (confirm('Вы уверены, что хотите очистить всю статистику?')) {
            localStorage.removeItem('mifFaktStats');
            loadAndDisplayStats();
            alert('Статистика очищена.');
        }
    }

    // ============================================================
    // ОБРАБОТЧИКИ
    // ============================================================

    document.getElementById('downloadStatsBtn').addEventListener('click', downloadCSV);
    document.getElementById('clearStatsBtn').addEventListener('click', clearStats);

    // Проверяем, есть ли уже статистика при загрузке (если пароль уже введён)
    // Но пароль вводится вручную
</script>
</body>
</html>

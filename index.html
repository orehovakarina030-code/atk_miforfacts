<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Миф / Факт · Игра</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15);
            padding: 30px 25px 40px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0b2b44;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .subhead {
            color: #3a5a7a;
            font-weight: 400;
            font-size: 1rem;
            border-left: 3px solid #7f9fbf;
            padding-left: 16px;
            margin-bottom: 24px;
            opacity: 0.8;
        }
        .setup-area {
            background: #eef2f7;
            border-radius: 32px;
            padding: 25px 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .setup-area h3 {
            color: #1f3b54;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .mode-btn {
            padding: 12px 28px;
            border: 2px solid #cbdae8;
            border-radius: 60px;
            background: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #1f3b54;
        }
        .mode-btn:hover {
            transform: scale(1.03);
            border-color: #3d7ea6;
        }
        .mode-btn.active {
            border-color: #1f3b54;
            background: #1f3b54;
            color: white;
        }
        .length-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .length-btn {
            padding: 10px 24px;
            border: 2px solid #cbdae8;
            border-radius: 60px;
            background: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #1f3b54;
        }
        .length-btn:hover {
            transform: scale(1.03);
            border-color: #3d7ea6;
        }
        .length-btn.active {
            border-color: #1f3b54;
            background: #1f3b54;
            color: white;
        }
        .length-btn .count {
            font-weight: 400;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .team-input-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }
        .team-input-area input {
            padding: 10px 20px;
            border: 2px solid #cbdae8;
            border-radius: 40px;
            font-size: 1rem;
            width: 180px;
            outline: none;
            transition: 0.15s;
        }
        .team-input-area input:focus {
            border-color: #3d7ea6;
        }
        .btn-start {
            padding: 10px 32px;
            background: #1d7a44;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-start:hover {
            background: #146a38;
            transform: scale(1.02);
        }
        .btn-start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .card-area {
            background: #eef2f7;
            border-radius: 32px;
            padding: 30px 20px 20px;
            margin: 10px 0 20px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }
        .card-container {
            width: 100%;
            max-width: 700px;
            min-height: 200px;
            perspective: 1000px;
            cursor: default;
        }
        .card {
            width: 100%;
            min-height: 200px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 28px 28px 32px;
            border: 4px solid transparent;
            transition: transform 0.6s, border-color 0.3s, min-height 0.3s;
            transform-style: preserve-3d;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card .front, .card .back {
            backface-visibility: hidden;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card .back {
            transform: rotateY(180deg);
            position: absolute;
            top: 28px;
            left: 28px;
            right: 28px;
            bottom: 28px;
        }
        .card-label {
            display: inline-block;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.8px;
            background: rgba(0,0,0,0.05);
            padding: 4px 16px;
            border-radius: 30px;
            color: #1f3b54;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        .card-text {
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 450;
            color: #0b1f2e;
            word-break: break-word;
            text-align: center;
            width: 100%;
        }
        .result-text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            color: #0b1f2e;
            word-break: break-word;
            text-align: center;
            width: 100%;
        }
        .result-text.correct {
            color: #1d7a44;
        }
        .result-text.wrong {
            color: #8b0000;
        }
        .explanation-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #1f3b54;
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 16px;
            width: 100%;
            text-align: center;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        /* Адаптивный размер текста для длинных пояснений */
        .explanation-text.long-text {
            font-size: 0.95rem;
        }
        .explanation-text.very-long-text {
            font-size: 0.85rem;
        }
        .card.border-correct {
            border-color: #1d8b4f !important;
            background: #d4edda !important;
        }
        .card.border-wrong {
            border-color: #8b0000 !important;
            background: #fce4e4 !important;
        }
        .card.border-myth {
            border-color: #3d7ea6;
            background: #d9e6f2;
        }
        .card.border-fact {
            border-color: #1d8b4f;
            background: #d4edda;
        }
        .choices {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px 18px;
            margin: 30px 0 16px;
        }
        .choice-btn {
            border: none;
            background: white;
            border-radius: 80px;
            padding: 14px 34px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f3b54;
            border: 2px solid #cbdae8;
            cursor: pointer;
            transition: 0.15s;
            min-width: 130px;
        }
        .choice-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: #e6f0ff;
            border-color: #3d7ea6;
        }
        .choice-btn:disabled {
            opacity: 0.45;
            transform: scale(0.96);
            pointer-events: none;
        }
        .choice-btn.myth-btn {
            border-color: #6b8baa;
        }
        .choice-btn.fact-btn {
            border-color: #3d9b6a;
        }
        .choice-btn.myth-btn:hover:not(:disabled) {
            background: #d9e6f2;
            border-color: #2b5a7a;
        }
        .choice-btn.fact-btn:hover:not(:disabled) {
            background: #d4edda;
            border-color: #1d7a44;
        }
        .next-btn-container {
            display: flex;
            justify-content: center;
            margin: 10px 0 5px;
        }
        .next-btn {
            padding: 12px 40px;
            background: #2b5a7a;
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        .next-btn:hover:not(:disabled) {
            background: #1f4b6e;
            transform: scale(1.02);
        }
        .next-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .info-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 10px;
            gap: 12px;
            background: #f0f5fe;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .progress {
            font-weight: 500;
            color: #1c3d5e;
        }
        .progress span {
            background: #cbdae8;
            padding: 2px 14px;
            border-radius: 50px;
            margin: 0 4px;
        }
        .reset-btn {
            background: transparent;
            border: 1px solid #8aaac9;
            border-radius: 40px;
            padding: 8px 24px;
            font-weight: 500;
            color: #1f3b54;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .reset-btn:hover {
            background: #1f3b54;
            color: white;
            border-color: #1f3b54;
        }
        .feedback {
            margin: 12px 0 0;
            font-size: 1rem;
            min-height: 2.2rem;
            font-weight: 450;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .hidden {
            display: none !important;
        }
        .game-over-msg {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f3b54;
            text-align: center;
            padding: 10px;
        }
        .turn-indicator {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f3b54;
            padding: 4px 16px;
            background: #eef2f7;
            border-radius: 30px;
            display: inline-block;
        }
        .team-progress-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 10px 0 5px;
        }
        .team-progress {
            flex: 1;
            min-width: 150px;
            background: #eef2f7;
            border-radius: 30px;
            padding: 10px 16px;
        }
        .team-progress .team-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f3b54;
            margin-bottom: 4px;
        }
        .team-progress .progress-bar {
            width: 100%;
            height: 8px;
            background: #dce5ef;
            border-radius: 10px;
            overflow: hidden;
        }
        .team-progress .progress-bar .fill {
            height: 100%;
            background: #2b5a7a;
            border-radius: 10px;
            transition: width 0.3s;
            width: 0%;
        }
        .team-progress .progress-text {
            font-size: 0.75rem;
            color: #4d6a87;
            margin-top: 2px;
        }
        .admin-panel {
            display: none !important;
        }
        @media (max-width: 550px) {
            .container { padding: 18px; }
            .card-text { font-size: 1.05rem; }
            .choice-btn { padding: 12px 18px; min-width: 100px; font-size: 1rem; }
            .choices { gap: 10px; }
            h1 { font-size: 1.6rem; }
            .length-btn, .mode-btn { padding: 10px 16px; font-size: 0.85rem; }
            .team-input-area input { width: 130px; }
            .next-btn { padding: 10px 30px; font-size: 1rem; }
            .team-progress { min-width: 120px; }
            .card .back { top: 16px; left: 16px; right: 16px; bottom: 16px; }
            .explanation-text { font-size: 0.95rem; padding: 8px 12px; }
            .explanation-text.long-text { font-size: 0.85rem; }
            .explanation-text.very-long-text { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h1>🧩 Миф · Факт</h1>
        <span style="background: #dbe4ee; padding: 4px 20px; border-radius: 40px; font-weight: 500; color: #1f3b54; font-size: 0.9rem;">12–14 лет</span>
    </div>
    <div class="subhead">Выберите режим, длину игры и начните!</div>

    <div class="setup-area" id="setupArea">
        <h3>🎮 Выберите режим игры</h3>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="solo">Один игрок</button>
            <button class="mode-btn" data-mode="teams">Две команды</button>
        </div>

        <h3>📏 Выберите длину игры</h3>
        <div class="length-buttons">
            <button class="length-btn" data-count="22">Короткая <span class="count">(22 карточки)</span></button>
            <button class="length-btn active" data-count="44">Средняя <span class="count">(44 карточки)</span></button>
            <button class="length-btn" data-count="66">Длинная <span class="count">(66 карточек)</span></button>
        </div>

        <div class="team-input-area" id="teamInputArea">
            <input type="text" id="team1Input" placeholder="Название команды 1" value="Команда 1">
            <input type="text" id="team2Input" placeholder="Название команды 2" value="Команда 2">
            <button class="btn-start" id="startGameBtn">Начать игру</button>
        </div>
        <div style="margin-top: 12px; font-size: 0.9rem; color: #4d6a87;" id="modeDisplay">Режим: <strong>Один игрок</strong></div>
    </div>

    <div id="gameArea" class="hidden">
        <div style="text-align: center; margin-bottom: 12px;">
            <span class="turn-indicator" id="turnIndicator">Ход: Команда 1</span>
        </div>

        <div class="team-progress-container" id="teamProgressContainer"></div>

        <div class="card-area">
            <div class="card-container">
                <div class="card border-myth" id="cardDisplay">
                    <div class="front">
                        <div class="card-label" id="cardLabel">Утверждение</div>
                        <div class="card-text" id="cardText">Загружаем...</div>
                    </div>
                    <div class="back">
                        <div class="result-text" id="resultText"></div>
                        <div class="explanation-text" id="explanationText"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="choices">
            <button class="choice-btn myth-btn" id="mythBtn">Миф</button>
            <button class="choice-btn fact-btn" id="factBtn">Факт</button>
        </div>

        <div class="next-btn-container">
            <button class="next-btn" id="nextBtn" disabled>Далее →</button>
        </div>

        <div class="info-panel">
            <div class="progress">🗂️ <span id="currentIndexDisplay">1</span> / <span id="totalCardsDisplay">0</span></div>
            <button class="reset-btn" id="resetBtn">⟳ В начало</button>
        </div>

        <div class="feedback" id="feedbackMessage">
            <span>Нажмите «Миф» или «Факт»</span>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel"></div>
</div>

<script>
    // ============================================================
    // ДАННЫЕ: 66 пар (миф + факт)
    // ============================================================
    const ALL_DATA = [
        { type: 'myth', statement: "Уголовный жаргон — это признак причастности к крутому кругу лиц, его знают не все", explanation: "Уголовный жаргон — это маркер необразованности. Люди с высшим образованием и уважением в обществе не используют блатной язык." },
        { type: 'myth', statement: "До 14 лет ничего не будет, это будет считаться шалостью", explanation: "До 14 лет ставят на учёт в ПДН, вызывают на комиссию, отправляют в спецшколу. Это портит репутацию." },
        { type: 'myth', statement: "Все популярные люди хулиганили в школе", explanation: "99% популярных и успешных людей в школе учились и вели себя прилично. Если кто-то и хулиганил — он об этом жалеет." },
        { type: 'myth', statement: "Все преступники очень храбрые", explanation: "Храбрость — это идти на риск ради других. Преступники рискуют чужой жизнью и свободой. Это безответственность." },
        { type: 'myth', statement: "В интернете под чужим именем меня никто не найдет", explanation: "IP-адрес, номер телефона, геолокация — всё фиксируется. Полиция находит авторов угроз и оскорблений за 1–2 дня." },
        { type: 'myth', statement: "Если разбить окно, то это просто шалость, если никто не заметит", explanation: "За разбитое окно школа платит из бюджета — эти деньги могли пойти на новые компьютеры. А уборщица может порезаться. И камеры вас видят." },
        { type: 'myth', statement: "Меня никогда не поймают и ничего не заметят, я всё сделаю чисто", explanation: "В 90% краж в школах и магазинах находят по камерам в течение 48 часов. Камеры есть везде. Ты невидимка только в своих мыслях." },
        { type: 'myth', statement: "Если постоять рядом «на шухере», то ничего не будет", explanation: "Соучастие в преступлении — это тоже преступление. Ты отвечаешь наравне с тем, кто бьёт или крадёт. «Я просто стоял» в суде не работает." },
        { type: 'myth', statement: "Нужно наказывать непохожих на меня", explanation: "Никто не имеет права наказывать другого человека. Это называется самосуд — и это уголовное преступление по статье побои или умышленное причинение вреда здоровью." },
        { type: 'myth', statement: "Выложу фото с «пацанским» жестом по приколу", explanation: "Фото с запрещёнными жестами или символикой может быть признано экстремизмом." },
        { type: 'myth', statement: "Наушники можно украсть, никто же не заметит", explanation: "За кражу наушников (даже дешёвых) — штраф или исправительные работы. А хозяин мог копить на них месяцами." },
        { type: 'myth', statement: "Настоящий срок могут дать только за убийство", explanation: "За кражу, грабёж, разбой могут дать несколько лет. И это реальный срок в колонии, а не «условно»." },
        { type: 'myth', statement: "Я буду молчать, если меня поймают, тогда точно ничего не будет", explanation: "Молчание не освобождает от ответственности. Камеры, отпечатки пальцев, свидетели — всё говорит за тебя. А запирательство только ухудшает положение." },
        { type: 'myth', statement: "«Лайк» под постом — это просто поддержка", explanation: "«Лайк» под видео с дракой или кражей — это публичное одобрение преступления. Согласно закону, это может быть расценено как оправдание преступных действий." },
        { type: 'myth', statement: "В интернете можно шутить друг с другом над кем-то, это же просто интернет", explanation: "Травля в интернете (кибербуллинг) — это уголовное преследование по статье «клевета». Шутки в интернете имеют реальные последствия." },
        { type: 'myth', statement: "Издеваться над «не такими» это справедливо", explanation: "Никто не решает, кто «правильный», а кто «нет». У каждого есть чувства. Того, кого ты обидел, могут бояться выходить на улицу. Он может бросить школу из-за буллинга." },
        { type: 'myth', statement: "Меня вытащат, у меня есть «связи»", explanation: "«Связи» не работают против закона. Особенно если преступление серьёзное. Родители могут нанять адвоката, но это не отменяет судимость. И адвокат стоит больших денег." },
        { type: 'myth', statement: "Быть смелым и иногда хулиганить — привлекательно", explanation: "Быть смелым — это защищать других. А хулиганить — это причинять вред. Привлекательно быть добрым, надёжным, умным. А не тем, кто ломает жизнь себе и другим." },
        { type: 'myth', statement: "Если откажусь, то меня не станут уважать", explanation: "Уважение заслуживают поступки, а не подчинение. Человек, который умеет сказать «нет», вызывает больше уважения, чем тот, кто всегда соглашается." },
        { type: 'myth', statement: "Учиться в школе необязательно, потому что добиться успеха можно другими путями", explanation: "Без аттестата нельзя поступить в колледж или на работу. Даже курьером не возьмут без документа об образовании. Школа — это база для любой профессии." },
        { type: 'myth', statement: "Украсть в магазине — это интересный квест", explanation: "Это не квест. Это уголовное преступление по статье «кража»." },

    // ============================================================
    // СОСТОЯНИЕ ИГРЫ
    // ============================================================
    let state = {
        mode: 'solo',
        teams: ['Команда 1', 'Команда 2'],
        selectedLength: 44,
        currentTeamIndex: 0,
        cards: [],
        currentCardIndex: 0,
        isAnswered: false,
        gameStarted: false,
        scores: {},
        gameLog: [],
        waitingForNext: false,
        gameStartTime: null,
        seed: 0
    };

    // ============================================================
    // ГЕНЕРАТОР ПСЕВДОСЛУЧАЙНЫХ ЧИСЕЛ (seed-based)
    // ============================================================
    function seededRandom(seed) {
        let s = seed;
        return function() {
            s = (s * 9301 + 49297) % 233280;
            return s / 233280;
        };
    }

    function shuffleArrayWithSeed(arr, seed) {
        const random = seededRandom(seed);
        const result = [...arr];
        for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(random() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
        }
        return result;
    }

    // ============================================================
    // РАБОТА С LOCALSTORAGE
    // ============================================================
    function saveStats() {
        const data = {
            scores: state.scores,
            log: state.gameLog,
            teams: state.teams,
            seed: state.seed,
            date: new Date().toISOString()
        };
        localStorage.setItem('mifFaktStats', JSON.stringify(data));
    }

    function loadStats() {
        const saved = localStorage.getItem('mifFaktStats');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                state.scores = data.scores || {};
                state.gameLog = data.log || [];
                state.teams = data.teams || ['Команда 1', 'Команда 2'];
                state.seed = data.seed || 0;
                return true;
            } catch(e) { return false; }
        }
        return false;
    }

    function clearStats() {
        localStorage.removeItem('mifFaktStats');
    }

    // ============================================================
    // ФУНКЦИИ ИГРЫ
    // ============================================================

    function getCards(count, seed) {
        const shuffled = shuffleArrayWithSeed(ALL_DATA, seed);
        return shuffled.slice(0, count);
    }

    function initScores() {
        state.scores = {};
        state.teams.forEach(team => {
            state.scores[team] = { correct: 0, errors: 0, total: 0 };
        });
        state.gameLog = [];
        state.gameStartTime = Date.now();
    }

    function updateTeamProgress() {
        const container = document.getElementById('teamProgressContainer');
        let html = '';
        state.teams.forEach(team => {
            const s = state.scores[team] || { correct: 0, errors: 0, total: 0 };
            const total = state.cards.length || 1;
            const progress = Math.round((s.total / total) * 100);
            html += `
                <div class="team-progress">
                    <div class="team-name">${team}</div>
                    <div class="progress-bar">
                        <div class="fill" style="width: ${Math.min(progress, 100)}%"></div>
                    </div>
                    <div class="progress-text">${s.total} / ${total} (${Math.min(progress, 100)}%)</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function adjustExplanationTextSize(text) {
        const el = document.getElementById('explanationText');
        // Сбрасываем классы
        el.classList.remove('long-text', 'very-long-text');
        
        if (text.length > 200) {
            el.classList.add('very-long-text');
        } else if (text.length > 100) {
            el.classList.add('long-text');
        }
    }

    function showCard(index) {
        const card = state.cards[index];
        if (!card) return;

        const cardEl = document.getElementById('cardDisplay');
        // Сбрасываем классы
        cardEl.className = 'card border-myth';
        cardEl.classList.remove('flipped', 'border-correct', 'border-wrong');

        document.getElementById('cardLabel').textContent = 'Утверждение';
        document.getElementById('cardText').textContent = card.statement;
        document.getElementById('resultText').textContent = '';
        document.getElementById('explanationText').textContent = '';
        document.getElementById('explanationText').className = 'explanation-text';

        document.getElementById('currentIndexDisplay').textContent = index + 1;
        document.getElementById('totalCardsDisplay').textContent = state.cards.length;

        const team = state.teams[state.currentTeamIndex];
        document.getElementById('turnIndicator').textContent = `Ход: ${team}`;

        state.isAnswered = false;
        state.waitingForNext = false;
        document.getElementById('mythBtn').disabled = false;
        document.getElementById('factBtn').disabled = false;
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('feedbackMessage').innerHTML = `<span>${team}, что думаете? Миф или факт?</span>`;

        updateTeamProgress();
    }

    function nextTeam() {
        if (state.mode === 'teams') {
            state.currentTeamIndex = (state.currentTeamIndex + 1) % state.teams.length;
        }
    }

    function goToNextCard() {
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = true;

        if (state.currentCardIndex + 1 < state.cards.length) {
            state.currentCardIndex++;
            nextTeam();
            showCard(state.currentCardIndex);
        } else {
            document.getElementById('feedbackMessage').innerHTML =
                `<span class="game-over-msg">🏁 Игра завершена! Скачайте статистику через админ-панель.</span>`;
            document.getElementById('mythBtn').disabled = true;
            document.getElementById('factBtn').disabled = true;
            nextBtn.disabled = true;
            document.getElementById('turnIndicator').textContent = 'Игра окончена';
            saveStats();
        }
        // Разблокируем через небольшую задержку
        if (state.currentCardIndex + 1 < state.cards.length) {
            setTimeout(() => {
                if (!document.getElementById('nextBtn').disabled) return;
                document.getElementById('nextBtn').disabled = false;
            }, 300);
        }
    }

    function handleChoice(choice) {
        if (state.isAnswered || !state.gameStarted) return;
        const card = state.cards[state.currentCardIndex];
        if (!card) return;

        const isCorrect = (choice === card.type);
        const team = state.teams[state.currentTeamIndex];
        const s = state.scores[team] || { correct: 0, errors: 0, total: 0 };

        state.gameLog.push({
            team: team,
            cardIndex: state.currentCardIndex,
            statement: card.statement,
            type: card.type,
            choice: choice,
            isCorrect: isCorrect,
            timestamp: new Date().toISOString()
        });

        const cardEl = document.getElementById('cardDisplay');
        const resultText = document.getElementById('resultText');
        const explanationText = document.getElementById('explanationText');

        if (isCorrect) {
            s.correct++;
            cardEl.classList.add('border-correct', 'flipped');
            resultText.textContent = '✅ Верно!';
            resultText.className = 'result-text correct';
            
            // Показываем пояснение только для мифов
            if (card.type === 'myth' && card.explanation) {
                explanationText.textContent = card.explanation;
                adjustExplanationTextSize(card.explanation);
            } else {
                explanationText.textContent = '';
                explanationText.className = 'explanation-text';
            }
            document.getElementById('feedbackMessage').innerHTML = `<span>✅ Правильно!</span>`;
        } else {
            s.errors++;
            cardEl.classList.add('border-wrong', 'flipped');
            const typeLabel = card.type === 'myth' ? 'МИФ' : 'ФАКТ';
            resultText.textContent = `❌ Неверно! Это ${typeLabel}!`;
            resultText.className = 'result-text wrong';
            
            // Показываем пояснение только для мифов
            if (card.type === 'myth' && card.explanation) {
                explanationText.textContent = card.explanation;
                adjustExplanationTextSize(card.explanation);
            } else {
                explanationText.textContent = '';
                explanationText.className = 'explanation-text';
            }
            document.getElementById('feedbackMessage').innerHTML = `<span>❌ Неправильно! Это был ${typeLabel}.</span>`;
        }

        s.total++;
        state.scores[team] = s;

        state.isAnswered = true;
        state.waitingForNext = true;
        document.getElementById('mythBtn').disabled = true;
        document.getElementById('factBtn').disabled = true;
        document.getElementById('nextBtn').disabled = false;

        saveStats();
        updateTeamProgress();
    }

    function startGame() {
        const team1 = document.getElementById('team1Input').value.trim() || 'Команда 1';
        const team2 = document.getElementById('team2Input').value.trim() || 'Команда 2';

        if (state.mode === 'solo') {
            state.teams = [team1];
        } else {
            state.teams = [team1, team2];
        }

        state.seed = Date.now() + Math.floor(Math.random() * 10000);
        state.cards = getCards(state.selectedLength, state.seed);
        state.currentCardIndex = 0;
        state.currentTeamIndex = 0;
        state.gameStarted = true;
        initScores();

        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');

        showCard(0);
        saveStats();
    }

    function resetGame() {
        state.gameStarted = false;
        document.getElementById('setupArea').classList.remove('hidden');
        document.getElementById('gameArea').classList.add('hidden');
        state.currentCardIndex = 0;
        state.currentTeamIndex = 0;
        state.isAnswered = false;
        state.waitingForNext = false;
        state.scores = {};
        state.gameLog = [];
        state.gameStartTime = null;
        document.getElementById('feedbackMessage').innerHTML = `<span>Нажмите «Миф» или «Факт»</span>`;
        document.getElementById('turnIndicator').textContent = 'Ход: ---';
        document.getElementById('nextBtn').disabled = true;
        clearStats();
        updateTeamProgress();
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================

    const modeBtns = document.querySelectorAll('.mode-btn');
    const lengthBtns = document.querySelectorAll('.length-btn');

    modeBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            modeBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.mode = this.dataset.mode;
            document.getElementById('modeDisplay').textContent =
                `Режим: ${state.mode === 'solo' ? 'Один игрок' : 'Две команды'}`;
            const team2Input = document.getElementById('team2Input');
            if (state.mode === 'solo') {
                team2Input.style.display = 'none';
            } else {
                team2Input.style.display = 'inline-block';
            }
        });
    });
    document.getElementById('team2Input').style.display = 'none';

    lengthBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            lengthBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.selectedLength = parseInt(this.dataset.count);
        });
    });

    document.getElementById('startGameBtn').addEventListener('click', startGame);
    document.getElementById('mythBtn').addEventListener('click', function() { handleChoice('myth'); });
    document.getElementById('factBtn').addEventListener('click', function() { handleChoice('fact'); });
    document.getElementById('nextBtn').addEventListener('click', goToNextCard);
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    document.addEventListener('keydown', (e) => {
        if (e.key === '1') { if (!document.getElementById('mythBtn').disabled) document.getElementById('mythBtn').click(); }
        else if (e.key === '2') { if (!document.getElementById('factBtn').disabled) document.getElementById('factBtn').click(); }
        else if (e.key === 'Enter' || e.key === ' ') {
            if (!document.getElementById('nextBtn').disabled) {
                e.preventDefault();
                document.getElementById('nextBtn').click();
            }
        }
    });

    loadStats();
    updateTeamProgress();
</script>
</body>
</html>

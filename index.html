<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Миф / Факт · Игра с карточками</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #f4f7fc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15);
      padding: 30px 25px 40px;
      transition: all 0.2s;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: #0b2b44;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 6px 0;
      letter-spacing: -0.3px;
      flex-wrap: wrap;
    }
    .subhead {
      color: #3a5a7a;
      font-weight: 400;
      font-size: 1rem;
      border-left: 3px solid #7f9fbf;
      padding-left: 16px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    .card-area {
      background: #eef2f7;
      border-radius: 32px;
      padding: 30px 20px 20px;
      margin: 10px 0 20px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 680px;
      padding: 28px 28px 32px;
      transition: 0.25s ease;
      border: 1px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(2px);
      text-align: center;
    }
    .card.myth {
      background: #d9e6f2;
      border-left: 10px solid #3d7ea6;
    }
    .card.fact {
      background: #d4edda;
      border-left: 10px solid #1d8b4f;
    }
    .card-label {
      display: inline-block;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.8px;
      background: rgba(0,0,0,0.05);
      padding: 4px 16px;
      border-radius: 30px;
      color: #1f3b54;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .card-text {
      font-size: 1.3rem;
      line-height: 1.5;
      font-weight: 450;
      color: #0b1f2e;
      word-break: break-word;
    }
    .card-text small {
      font-size: 0.9rem;
      font-weight: 300;
      color: #2b4f6e;
    }
    .badge-myth {
      background: #2b5a7a;
      color: white;
      padding: 2px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-fact {
      background: #1d7a44;
      color: white;
      padding: 2px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px 18px;
      margin: 30px 0 16px;
    }
    .choice-btn {
      border: none;
      background: white;
      border-radius: 80px;
      padding: 14px 34px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #1f3b54;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
      border: 2px solid #cbdae8;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 130px;
      justify-content: center;
      background: #f8faff;
    }
    .choice-btn:hover {
      transform: scale(1.02);
      background: #e6f0ff;
      border-color: #3d7ea6;
      box-shadow: 0 8px 14px rgba(0, 40, 80, 0.08);
    }
    .choice-btn:active {
      transform: scale(0.96);
    }
    .choice-btn.myth-btn {
      border-color: #6b8baa;
    }
    .choice-btn.fact-btn {
      border-color: #3d9b6a;
    }
    .choice-btn.myth-btn:hover {
      background: #d9e6f2;
      border-color: #2b5a7a;
    }
    .choice-btn.fact-btn:hover {
      background: #d4edda;
      border-color: #1d7a44;
    }
    .choice-btn:disabled {
      opacity: 0.45;
      transform: scale(0.96);
      pointer-events: none;
      filter: grayscale(0.3);
    }
    .info-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0 10px;
      gap: 12px;
      background: #f0f5fe;
      padding: 12px 20px;
      border-radius: 60px;
    }
    .progress {
      font-weight: 500;
      color: #1c3d5e;
    }
    .progress span {
      background: #cbdae8;
      padding: 2px 14px;
      border-radius: 50px;
      margin: 0 4px;
    }
    .reset-btn {
      background: transparent;
      border: 1px solid #8aaac9;
      border-radius: 40px;
      padding: 8px 24px;
      font-weight: 500;
      color: #1f3b54;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
    }
    .reset-btn:hover {
      background: #1f3b54;
      color: white;
      border-color: #1f3b54;
    }
    .feedback {
      margin: 12px 0 0;
      font-size: 1rem;
      min-height: 2.2rem;
      font-weight: 450;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .feedback .emoji-big {
      font-size: 1.8rem;
      line-height: 1;
    }
    .footnote {
      font-size: 0.8rem;
      color: #4d6a87;
      text-align: center;
      margin-top: 25px;
      border-top: 1px solid #dce5ef;
      padding-top: 18px;
      opacity: 0.7;
    }
    @media (max-width: 550px) {
      .container { padding: 18px; }
      .card-text { font-size: 1.1rem; }
      .choice-btn { padding: 12px 18px; min-width: 100px; font-size: 1rem; }
      .choices { gap: 10px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
    <h1>🧩 Миф · Факт</h1>
    <span style="background: #dbe4ee; padding: 4px 20px; border-radius: 40px; font-weight: 500; color: #1f3b54; font-size: 0.9rem;">12–14 лет</span>
  </div>
  <div class="subhead">Выбери: это правда или ложь? Карточка перевернётся!</div>

  <div class="card-area" id="cardArea">
    <div class="card" id="cardDisplay">
      <div class="card-label" id="cardLabel">МИФ</div>
      <div class="card-text" id="cardText">Загружаем...</div>
    </div>
  </div>

  <div class="choices">
    <button class="choice-btn myth-btn" id="mythBtn" data-value="myth">❌ Миф</button>
    <button class="choice-btn fact-btn" id="factBtn" data-value="fact">✅ Факт</button>
  </div>

  <div class="info-panel">
    <div class="progress">🗂️ <span id="currentIndexDisplay">1</span> / <span id="totalCardsDisplay">0</span></div>
    <button class="reset-btn" id="resetBtn">⟳ Сначала</button>
  </div>

  <div class="feedback" id="feedbackMessage">
    <span>👆 Нажми «Миф» или «Факт»</span>
  </div>
  <div class="footnote">Карточки синие — миф · зелёные — факт (после выбора)</div>
</div>
<script>
  (function() {
    // ---------- ДАННЫЕ (миф + факт) ----------
    // Все пары взяты из документа, миф – синяя сторона, факт – зелёная.
    // Для игры: показываем миф, пользователь угадывает, факт раскрывается.
    const PAIRS = [
      { myth: "Уголовный жаргон — это признак причастности к крутому кругу лиц, его знают не все", fact: "Уголовный жаргон — это маркер необразованности. Люди с высшим образованием и уважением в обществе не используют блатной язык." },
      { myth: "До 14 лет ничего не будет, это будет считаться шалостью", fact: "До 14 лет ставят на учёт в ПДН, вызывают на комиссию, отправляют в спецшколу. Это портит репутацию." },
      { myth: "Все популярные люди хулиганили в школе", fact: "99% популярных и успешных людей в школе учились и вели себя прилично. Если кто-то и хулиганил — он об этом жалеет." },
      { myth: "Все преступники очень храбрые", fact: "Храбрость — это идти на риск ради других. Преступники рискуют чужой жизнью и свободой. Это безответственность." },
      { myth: "В интернете под чужим именем меня никто не найдет", fact: "IP-адрес, номер телефона, геолокация — всё фиксируется. Полиция находит авторов угроз и оскорблений за 1–2 дня." },
      { myth: "Если разбить окно, то это просто шалость, если никто не заметит", fact: "За разбитое окно школа платит из бюджета — эти деньги могли пойти на новые компьютеры. А уборщица может порезаться. И камеры вас видят." },
      { myth: "Меня никогда не поймают и ничего не заметят, я всё сделаю чисто", fact: "В 90% краж в школах и магазинах находят по камерам в течение 48 часов. Камеры есть везде. Ты невидимка только в своих мыслях." },
      { myth: "Если постоять рядом «на шухере», то ничего не будет", fact: "Соучастие в преступлении — это тоже преступление. Ты отвечаешь наравне с тем, кто бьёт или крадёт. «Я просто стоял» в суде не работает." },
      { myth: "Нужно наказывать непохожих на меня", fact: "Никто не имеет права наказывать другого человека. Это называется самосуд — и это уголовное преступление по статье побои или умышленное причинение вреда здоровью." },
      { myth: "Выложу фото с «пацанским» жестом по приколу", fact: "Фото с запрещёнными жестами или символикой может быть признано экстремизмом." },
      { myth: "Наушники можно украсть, никто же не заметит", fact: "За кражу наушников (даже дешёвых) — штраф или исправительные работы. А хозяин мог копить на них месяцами." },
      { myth: "Настоящий срок могут дать только за убийство", fact: "За кражу, грабёж, разбой могут дать несколько лет. И это реальный срок в колонии, а не «условно»." },
      { myth: "Я буду молчать, если меня поймают, тогда точно ничего не будет", fact: "Молчание не освобождает от ответственности. Камеры, отпечатки пальцев, свидетели — всё говорит за тебя. А запирательство только ухудшает положение." },
      { myth: "«Лайк» под постом — это просто поддержка", fact: "«Лайк» под видео с дракой или кражей — это публичное одобрение преступления. Согласно закону, это может быть расценено как оправдание преступных действий." },
      { myth: "В интернете можно шутить друг с другом над кем-то, это же просто интернет", fact: "Травля в интернете (кибербуллинг) — это уголовное преследование по статье «клевета». Шутки в интернете имеют реальные последствия." },
      // + дополнительные важные (из документа)
      { myth: "Издеваться над «не такими» это справедливо", fact: "Никто не решает, кто «правильный», а кто «нет». У каждого есть чувства. Того, кого ты обидел, могут бояться выходить на улицу. Он может бросить школу из-за буллинга." },
      { myth: "Меня вытащат, у меня есть «связи»", fact: "«Связи» не работают против закона. Особенно если преступление серьёзное. Родители могут нанять адвоката, но это не отменяет судимость. И адвокат стоит больших денег." },
      { myth: "Быть смелым и иногда хулиганить — привлекательно", fact: "Быть смелым — это защищать других. А хулиганить — это причинять вред. Привлекательно быть добрым, надёжным, умным. А не тем, кто ломает жизнь себе и другим." },
      { myth: "Если откажусь, то меня не станут уважать", fact: "Уважение заслуживают поступки, а не подчинение. Человек, который умеет сказать «нет», вызывает больше уважения, чем тот, кто всегда соглашается." },
      { myth: "Учиться в школе необязательно, потому что добиться успеха можно другими путями", fact: "Без аттестата нельзя поступить в колледж или на работу. Даже курьером не возьмут без документа об образовании. Школа — это база для любой профессии." },
      { myth: "Украсть в магазине — это интересный квест", fact: "Это не квест. Это уголовное преступление по статье «кража»." },
      { myth: "Срок в тюрьме — это пауза, после неё можно начать все сначала", fact: "После тюрьмы нельзя работать в госструктурах, банках, школах, авиации, полиции. 70% работодателей отказывают в работе из-за судимости. Это не пауза — это крест на карьере." },
      { myth: "Отвечать ударом на удар правильно", fact: "Ответный удар — это драка, за которую ставят на учёт и могут посадить. А уйти, позвать взрослых или решить словами — это выбор сильного человека." },
      { myth: "Родители меня не поймут, если я расскажу о том, что происходит в нашей компании", fact: "Родители могут не понять с первого раза, но они хотят защитить тебя. Хуже, когда ты остаёшься один с проблемой, которая становится всё больше. Они — твоя страховка." }
    ];

    // Состояние игры
    let currentIndex = 0;
    let isAnswered = false;
    let totalCards = PAIRS.length;

    // DOM элементы
    const cardDisplay = document.getElementById('cardDisplay');
    const cardLabel = document.getElementById('cardLabel');
    const cardText = document.getElementById('cardText');
    const mythBtn = document.getElementById('mythBtn');
    const factBtn = document.getElementById('factBtn');
    const resetBtn = document.getElementById('resetBtn');
    const currentIndexSpan = document.getElementById('currentIndexDisplay');
    const totalCardsSpan = document.getElementById('totalCardsDisplay');
    const feedbackDiv = document.getElementById('feedbackMessage');

    // Инициализация отображения
    function updateCard(index, showFact = false) {
      const pair = PAIRS[index];
      if (!pair) return;

      if (showFact) {
        // Показываем факт (зелёный)
        cardDisplay.className = 'card fact';
        cardLabel.innerHTML = '✅ ФАКТ';
        cardLabel.style.color = '#0f5c2e';
        cardText.innerHTML = pair.fact;
      } else {
        // Показываем миф (синий)
        cardDisplay.className = 'card myth';
        cardLabel.innerHTML = '🧩 МИФ';
        cardLabel.style.color = '#1f4b6e';
        cardText.innerHTML = pair.myth;
      }
      // Обновляем счётчик
      currentIndexSpan.textContent = index + 1;
      totalCardsSpan.textContent = totalCards;
    }

    // Сброс активного состояния (кнопки активны)
    function enableButtons() {
      mythBtn.disabled = false;
      factBtn.disabled = false;
    }

    function disableButtons() {
      mythBtn.disabled = true;
      factBtn.disabled = true;
    }

    // Переход к следующей карточке (или завершение)
    function nextCard() {
      if (currentIndex + 1 < totalCards) {
        currentIndex++;
        isAnswered = false;
        updateCard(currentIndex, false);
        enableButtons();
        feedbackDiv.innerHTML = `<span>🤔 Что думаешь? Миф или факт?</span>`;
      } else {
        // Игра завершена
        feedbackDiv.innerHTML = `<span class="emoji-big">🏁</span> Отлично! Все карточки пройдены. Нажми «Сначала», чтобы повторить.`;
        disableButtons();
        // показываем последний факт? оставляем как есть.
      }
    }

    // Обработка выбора игрока
    function handleChoice(choice) {
      if (isAnswered) {
        feedbackDiv.innerHTML = `<span>⏳ Уже отвечено. Нажми «Сначала» или перейди к следующей карточке.</span>`;
        return;
      }
      const pair = PAIRS[currentIndex];
      if (!pair) return;

      // Определяем, что является фактом (в паре myth/fact)
      // Игрок выбирает: "myth" или "fact"
      // Если игрок выбрал "fact" и на самом деле это миф – мы показываем факт (переворот)
      // Если игрок выбрал "myth" и на самом деле это факт? такого не бывает, но на всякий случай.
      // В нашей логике: показываем миф. Если игрок говорит "факт" — он ошибается (т.к. показан миф).
      // Если игрок говорит "миф" — он угадал.
      const isMythShown = true; // всегда показываем миф перед выбором

      let userCorrect = false;
      let factRevealed = false;
      let message = '';

      if (choice === 'myth') {
        // Игрок сказал, что это миф — верно! (потому что мы показываем миф)
        userCorrect = true;
        message = '✅ Верно! Это действительно МИФ. Вот факт:';
        factRevealed = true;
      } else if (choice === 'fact') {
        // Игрок сказал, что это факт — ошибка, показываем факт
        userCorrect = false;
        message = '❌ Не угадал! Это был МИФ. Вот настоящий факт:';
        factRevealed = true;
      }

      // Переворачиваем карточку — показываем факт
      if (factRevealed) {
        updateCard(currentIndex, true);
        // Дополнительно показываем в feedback
        feedbackDiv.innerHTML = `<span>${message}</span>`;
        isAnswered = true;
        disableButtons();

        // автоматически переключим на следующую карточку через 3.5 сек
        setTimeout(() => {
          if (currentIndex + 1 < totalCards) {
            nextCard();
          } else {
            // конец игры, кнопки остаются заблокированными, но показываем финал
            feedbackDiv.innerHTML = `<span class="emoji-big">🎉</span> Игра завершена! Нажми «Сначала» для повторного прохождения.`;
          }
        }, 3500);
      }
    }

    // Сброс игры
    function resetGame() {
      currentIndex = 0;
      isAnswered = false;
      updateCard(0, false);
      enableButtons();
      feedbackDiv.innerHTML = `<span>🔄 Новая игра! Выбери: Миф или Факт?</span>`;
      // убираем таймауты (если были)
    }

    // Назначение обработчиков
    mythBtn.addEventListener('click', function() {
      if (isAnswered) return;
      handleChoice('myth');
    });

    factBtn.addEventListener('click', function() {
      if (isAnswered) return;
      handleChoice('fact');
    });

    resetBtn.addEventListener('click', resetGame);

    // Запуск
    totalCardsSpan.textContent = totalCards;
    resetGame();

    // Добавляем возможность переключения по клавишам (1-миф, 2-факт)
    document.addEventListener('keydown', (e) => {
      if (e.key === '1') {
        if (!mythBtn.disabled) mythBtn.click();
      } else if (e.key === '2') {
        if (!factBtn.disabled) factBtn.click();
      }
    });

  })();
</script>
</body>
</html>
